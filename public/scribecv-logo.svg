<svg width="100%" viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ScribeCV</title>
  <desc>ScribeCV Logo: Modern Document & Quill icon with premium typography</desc>
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="logo-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="60%" stop-color="#6d28d9" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Fold Gradient -->
    <linearGradient id="logo-fold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Line Gradient -->
    <linearGradient id="logo-line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Quill Gradient -->
    <linearGradient id="logo-quill-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>

    <filter id="logo-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Left Icon Container (Scaled to 100x100 at offset 20, 20) -->
  <g transform="translate(20, 20) scale(0.1953125)">
    <!-- Squircle Container -->
    <rect width="512" height="512" rx="112" fill="url(#logo-bg-grad)" />

    <!-- Main Document Shape -->
    <g filter="url(#logo-shadow)">
      <path d="M 144 96 L 320 96 L 376 152 L 376 400 C 376 413.25 365.25 424 352 424 L 160 424 C 146.75 424 136 413.25 136 400 L 136 104 C 136 99.58 139.58 96 144 96 Z" fill="#ffffff" />
      <path d="M 320 96 L 376 152 L 332 152 C 325.37 152 320 146.63 320 140 Z" fill="url(#logo-fold-grad)" />
    </g>

    <!-- Resume Content Lines -->
    <rect x="172" y="148" width="128" height="18" rx="9" fill="url(#logo-line-grad)" />
    <rect x="172" y="178" width="80" height="10" rx="5" fill="#a5b4fc" />
    <rect x="172" y="206" width="168" height="4" rx="2" fill="#e0e7ff" />
    <rect x="172" y="226" width="64" height="10" rx="5" fill="#6366f1" opacity="0.85" />
    <rect x="172" y="246" width="168" height="8" rx="4" fill="#cbd5e1" />
    <rect x="172" y="262" width="140" height="8" rx="4" fill="#e2e8f0" />
    <rect x="172" y="288" width="52" height="10" rx="5" fill="#6366f1" opacity="0.85" />
    <rect x="172" y="308" width="168" height="8" rx="4" fill="#cbd5e1" />
    <rect x="172" y="324" width="120" height="8" rx="4" fill="#e2e8f0" />

    <!-- Stylized Feather Quill -->
    <g filter="url(#logo-shadow)">
      <path d="M 336 296 C 368 256 392 216 416 168 C 400 200 376 240 348 276 L 316 352 C 314 356 314 360 316 364 L 328 376 C 332 378 336 378 340 376 L 416 344 C 380 372 340 396 296 412 C 316 372 328 332 336 296 Z" fill="url(#logo-quill-grad)" />
      <circle cx="332" cy="360" r="4" fill="#ffffff" />
      <path d="M 332 360 L 318 374" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    </g>
  </g>

  <!-- Brand Typography -->
  <text x="144" y="82" font-family="'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="700" letter-spacing="-1.5" fill="#0f172a" class="brand-text">Scribe<tspan fill="#4f46e5">CV</tspan></text>

  <!-- Subtitle -->
  <text x="148" y="110" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" letter-spacing="3.5" fill="#6366f1" class="brand-sub">ATS RESUME BUILDER</text>

  <style>
    @media (prefers-color-scheme: dark) {
      .brand-text { fill: #f8fafc; }
      .brand-sub { fill: #818cf8; }
    }
  </style>
</svg>
