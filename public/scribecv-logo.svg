<svg width="100%" viewBox="0 0 520 162" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ScribeCV</title>
  <desc>ScribeCV logomark: interlocking geometric shapes with deep indigo and violet gradients, signifying a modern, premium ATS builder.</desc>
  <defs>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b45c9" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="grad-sub" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b2a8f" />
      <stop offset="100%" stop-color="#5b45c9" />
    </linearGradient>
  </defs>

  <!-- Hallmark-inspired minimalist geometric logomark -->
  <g transform="translate(16, 24)">
    <rect x="0" y="36" width="72" height="72" rx="24" fill="url(#grad-main)" />
    <rect x="36" y="0" width="72" height="72" rx="24" fill="url(#grad-sub)" opacity="0.9" style="mix-blend-mode: hard-light;" />
    <path d="M 36 36 L 72 36 L 72 72 L 36 72 Z" fill="#ffffff" opacity="0.1" />
  </g>

  <!-- Typography -->
  <text x="156" y="100" font-family="'Outfit', -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="700" letter-spacing="-1.5" fill="#0f172a" class="brand-text">ScribeCV</text>

  <!-- Subheader -->
  <text x="162" y="132" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="500" letter-spacing="4" fill="#5b45c9" class="brand-sub">ATS Resume Builder</text>

  <style>
    @media (prefers-color-scheme: dark) {
      .brand-text { fill: #f8fafc; }
      .brand-sub { fill: #a78bfa; }
    }
  </style>
</svg>
